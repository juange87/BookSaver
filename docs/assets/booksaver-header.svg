<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">BookSaver header banner</title>
  <desc id="desc">A banner showing the BookSaver flow from page capture to OCR to EPUB export.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f8f6" />
      <stop offset="100%" stop-color="#e7f0ec" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f4f7f6" />
    </linearGradient>
    <linearGradient id="phoneScreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#edf6f2" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#112022" flood-opacity="0.13" />
    </filter>
    <style>
      .ink { fill: #182325; }
      .muted { fill: #617173; }
      .green { fill: #1f8a63; }
      .teal { fill: #157a8a; }
      .orange { fill: #d97745; }
      .stroke-soft { stroke: #d7e4df; }
      .stroke-mid { stroke: #a9c0b8; }
      .title { font: 700 72px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .subtitle { font: 500 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .label { font: 700 26px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .small { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)" />
  <rect x="48" y="48" width="1184" height="544" rx="30" fill="#ffffff" opacity="0.72" />

  <g transform="translate(90 88)">
    <text x="0" y="0" class="title ink" dominant-baseline="hanging">BookSaver</text>
    <text x="2" y="96" class="subtitle muted" dominant-baseline="hanging">Capture old pages, clean OCR, export EPUB</text>

    <g transform="translate(0 178)">
      <rect x="0" y="0" width="150" height="46" rx="14" fill="#dff2ea" />
      <rect x="164" y="0" width="116" height="46" rx="14" fill="#d8eef2" />
      <rect x="294" y="0" width="132" height="46" rx="14" fill="#f6e4da" />
      <text x="75" y="23" text-anchor="middle" dominant-baseline="middle" class="small green">Capture</text>
      <text x="222" y="23" text-anchor="middle" dominant-baseline="middle" class="small teal">OCR</text>
      <text x="360" y="23" text-anchor="middle" dominant-baseline="middle" class="small orange">EPUB</text>
    </g>

  </g>

  <g filter="url(#shadow)">
    <rect x="88" y="332" width="280" height="218" rx="24" fill="url(#card)" class="stroke-soft" stroke-width="2" />
    <text x="124" y="378" class="label ink">1. Capture</text>
    <text x="124" y="408" class="small muted">Mac camera or imported iPhone photos</text>

    <rect x="158" y="432" width="132" height="90" rx="22" fill="#152426" />
    <rect x="168" y="442" width="112" height="70" rx="14" fill="url(#phoneScreen)" />
    <rect x="204" y="449" width="40" height="5" rx="2.5" fill="#c8d7d1" />
    <rect x="185" y="465" width="78" height="34" rx="8" fill="#ffffff" stroke="#d7e4df" />
    <path d="M198 487 L224 469 L250 487" fill="none" stroke="#1f8a63" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <g transform="translate(404 436)">
    <path d="M0 0 H78" fill="none" stroke="#9cb9b0" stroke-width="8" stroke-linecap="round" />
    <path d="M62 -14 L92 0 L62 14" fill="none" stroke="#9cb9b0" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <g filter="url(#shadow)">
    <rect x="500" y="332" width="280" height="218" rx="24" fill="url(#card)" class="stroke-soft" stroke-width="2" />
    <text x="536" y="378" class="label ink">2. OCR</text>
    <text x="536" y="408" class="small muted">Apple Vision plus Tesseract fallback</text>

    <rect x="554" y="438" width="168" height="82" rx="16" fill="#ffffff" stroke="#d7e4df" />
    <rect x="578" y="456" width="64" height="8" rx="4" fill="#157a8a" />
    <rect x="578" y="473" width="88" height="8" rx="4" fill="#9bcad2" />
    <rect x="578" y="490" width="74" height="8" rx="4" fill="#9bcad2" />
    <path d="M674 456 H700" fill="none" stroke="#9cb9b0" stroke-width="4" stroke-linecap="round" />
    <path d="M674 473 H708" fill="none" stroke="#9cb9b0" stroke-width="4" stroke-linecap="round" />
    <path d="M674 490 H694" fill="none" stroke="#9cb9b0" stroke-width="4" stroke-linecap="round" />
  </g>

  <g transform="translate(816 436)">
    <path d="M0 0 H78" fill="none" stroke="#9cb9b0" stroke-width="8" stroke-linecap="round" />
    <path d="M62 -14 L92 0 L62 14" fill="none" stroke="#9cb9b0" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <g filter="url(#shadow)">
    <rect x="912" y="332" width="280" height="218" rx="24" fill="url(#card)" class="stroke-soft" stroke-width="2" />
    <text x="948" y="378" class="label ink">3. EPUB</text>
    <text x="948" y="408" class="small muted">Structured export with live table of contents</text>

    <rect x="968" y="438" width="164" height="82" rx="16" fill="#ffffff" stroke="#d7e4df" />
    <text x="992" y="464" class="small ink">Indice EPUB</text>
    <rect x="992" y="477" width="86" height="7" rx="3.5" fill="#1f8a63" opacity="0.22" />
    <rect x="992" y="492" width="102" height="7" rx="3.5" fill="#a9c0b8" />
    <rect x="992" y="507" width="94" height="7" rx="3.5" fill="#a9c0b8" />
    <path d="M1086 456 l18 0 l0 18" fill="none" stroke="#1f8a63" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M1085 474 l20 -20" fill="none" stroke="#1f8a63" stroke-width="4" stroke-linecap="round" />
  </g>
</svg>
