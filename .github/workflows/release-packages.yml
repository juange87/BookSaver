name: Release Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Tag de la release a la que adjuntar los paquetes
        required: true
        type: string
      source_ref:
        description: Ref opcional desde la que construir los paquetes
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS packages
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.source_ref || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tests
        run: npm test

      - name: Build macOS Apple Silicon package
        run: npm run package:macos

      - name: Build macOS Intel package
        run: npm run package:macos:x64

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages-macos
          path: |
            dist/BookSaver-*-macos-arm64.zip
            dist/BookSaver-*-macos-x64.zip
          if-no-files-found: error

  build-windows:
    name: Build Windows package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.source_ref || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run CI-safe tests
        run: npm run test:ci:windows

      - name: Build Windows package
        run: npm run package:windows

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages-windows
          path: dist/BookSaver-*-windows-x64.zip
          if-no-files-found: error

  publish-release-assets:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.release.outputs.tag }}" \
            release-assets/release-packages-macos/*.zip \
            release-assets/release-packages-windows/*.zip \
            --clobber
